<div class="pm-header-container">
  <div class="pm-header">
    <!-- Top navigation bar -->
    <div class="pm-top-nav">
      <!-- Title -->
      <span class="pm-title">Project Management</span>

      <!-- Right-side nav buttons -->
      <div class="pm-nav-buttons">
        <!-- AI icon button -->
        <button class="pm-ai-btn" aria-label="AI Assistant">
          <img class="pm-ai-btn__bg" src="assets/project-management/icon-ai-button.svg" alt="" />
          <img class="pm-ai-btn__icon" src="assets/project-management/icon-ai.svg" alt="" />
        </button>

        <!-- Notification icons -->
        <div class="pm-icons">
          <!-- Bell -->
          <div class="pm-icon-btn" aria-label="Notifications">
            <div class="pm-bell">
              <img src="assets/project-management/icon-bell.svg" alt="Bell" />
              <img class="pm-bell__dot" src="assets/project-management/icon-dot.svg" alt="" />
            </div>
          </div>

          <!-- 9-dot menu -->
          <button class="pm-icon-btn" aria-label="Apps menu">
            <img src="assets/project-management/icon-menu-dots.svg" alt="Menu" />
          </button>
        </div>

        <!-- Avatar -->
        <div class="pm-avatar" aria-label="User profile">
          <img class="pm-avatar__bg" src="assets/project-management/avatar.svg" alt="" />
          <span class="pm-avatar__initial">M</span>
        </div>
      </div>
    </div>
  </div>
</div>
