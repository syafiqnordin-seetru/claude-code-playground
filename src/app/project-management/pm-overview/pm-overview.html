<div class="pm-overview">

  <div class="pm-kpi-container">

      <div class="pm-kpi__icon-wrap">
        <img src="assets/project-management/icon-schedule.svg" alt="" />
      </div>
    </button>

    <button class="pm-kpi__card">
      <div class="pm-kpi__info">
        <span class="pm-kpi__label">Overdue approval</span>

      </div>
      <div class="pm-kpi__icon-wrap">
        <img src="assets/project-management/icon-assignment-late.svg" alt="" />

    <div class="pm-kpi__card pm-kpi__card--static">
      <div class="pm-kpi__info">

      <div class="pm-kpi__icon-wrap">

    <div class="pm-kpi__card pm-kpi__card--static">
      <div class="pm-kpi__info">

      <div class="pm-kpi__icon-wrap">
        <img src="assets/project-management/icon-overview.svg" alt="" />
      </div>
    </div>

    <div class="pm-kpi__card pm-kpi__card--static">
      <div class="pm-kpi__info">
        <span class="pm-kpi__label">Project closeout</span>
        <span class="pm-kpi__value">153</span>
      </div>
      <div class="pm-kpi__icon-wrap">
        <img src="assets/project-management/icon-archive.svg" alt="" />
      </div>
    </div>
